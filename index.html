<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login na CSTwiter.WORLD</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="styles.css">
</head>

<body class="login-page">

 <main class="login-box" style="max-width: 600px;">

  <article>
    <h2>Login na CSTwiter.WORLD</h2>

    <form action="feed.html">

      <label>E-mail
        <input type="email" required>
      </label>

      <label>Senha
        <input type="password" required minlength="4">
      </label>

      <button type="submit">Entrar</button>

    </form>

    <p>
      <a href="cadastro.html">Criar conta</a><br>
      <a href="#">Esqueceu sua senha?</a>
    </p>

  </article>

</main>

</body>
</html>
